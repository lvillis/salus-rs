name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*-*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/salus

jobs:
  verify:
    name: Verify native GNU build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify
        run: |
          cargo fmt --all --check
          cargo check --all-features --locked
          cargo check --no-default-features --locked
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo clippy --all-targets --no-default-features --locked -- -D warnings
          cargo test --all-features --locked
          cargo test --no-default-features --locked

      - name: Build full release binary
        run: cargo build --release --locked

      - name: Build slim release binary
        run: cargo build --release --locked --no-default-features

      - name: Verify full Docker build
        run: docker build -t salus-release .

      - name: Verify slim Docker build
        run: docker build --build-arg SALUS_FEATURE_PROFILE=slim -t salus-release-slim .

  build-binaries:
    name: Build ${{ matrix.asset_suffix }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64-gnu
            cargo_args: "--release --locked"
          - target: aarch64-unknown-linux-gnu
            asset_suffix: linux-aarch64-gnu
            cargo_args: "--release --locked"
          - target: x86_64-unknown-linux-musl
            asset_suffix: linux-x86_64-musl
            cargo_args: "--release --locked"
          - target: aarch64-unknown-linux-musl
            asset_suffix: linux-aarch64-musl
            cargo_args: "--release --locked"
          - target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64-gnu-slim
            cargo_args: "--release --locked --no-default-features"
          - target: aarch64-unknown-linux-gnu
            asset_suffix: linux-aarch64-gnu-slim
            cargo_args: "--release --locked --no-default-features"
          - target: x86_64-unknown-linux-musl
            asset_suffix: linux-x86_64-musl-slim
            cargo_args: "--release --locked --no-default-features"
          - target: aarch64-unknown-linux-musl
            asset_suffix: linux-aarch64-musl-slim
            cargo_args: "--release --locked --no-default-features"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          toolchain: 1.95.0
          args: ${{ matrix.cargo_args }}

      - name: Package artifact
        env:
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist package
          cp "target/${TARGET}/release/salus" package/salus
          cp LICENSE README.md package/
          archive_name="salus-${VERSION}-${ASSET_SUFFIX}.tar.gz"
          tar -czf "dist/${archive_name}" -C package salus LICENSE README.md

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksum manifest
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Generate release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          awk -v version="${VERSION}" '
            $0 ~ "^## \\[" version "\\]" { found = 1 }
            found && $0 ~ "^## \\[" version "\\]" { print; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > dist/CHANGELOG_SECTION.md

          if [[ ! -s dist/CHANGELOG_SECTION.md ]]; then
            echo "failed to locate CHANGELOG entry for ${VERSION}" >&2
            exit 1
          fi

          cat > dist/RELEASE_NOTES.md <<EOF
          # salus ${VERSION}

          ## Binary Flavors

          - \`full\`: includes \`grpc\` and bundled public root CAs.
          - \`slim\`: omits the \`grpc\` subcommand and bundled public root CAs.

          ## Binary Platforms

          - \`linux/amd64\` -> \`x86_64\`
          - \`linux/arm64\` -> \`aarch64\`
          - Binary assets are published for both \`gnu\` and \`musl\` Linux targets.
          - Each platform ships \`full\` and \`slim\` variants.

          ## Asset Naming

          - \`salus-${VERSION}-linux-<arch>-<libc>.tar.gz\` for \`full\`
          - \`salus-${VERSION}-linux-<arch>-<libc>-slim.tar.gz\` for \`slim\`

          ## Archive Layout

          - Flat root layout with exactly:
          - \`salus\`
          - \`LICENSE\`
          - \`README.md\`

          ## Checksums

          - Verify downloaded archives with the attached \`SHA256SUMS\` file.

          ## Changelog

          EOF

          cat dist/CHANGELOG_SECTION.md >> dist/RELEASE_NOTES.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          body_path: dist/RELEASE_NOTES.md
          overwrite_files: false

  publish-container:
    name: Publish GHCR image
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute container tags
        id: meta
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          {
            echo "version=${VERSION}"
            echo "full_tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}"
            if [[ "${VERSION}" != *-* ]]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
            echo "slim_tags<<EOF"
            echo "${IMAGE_NAME}:${VERSION}-slim"
            if [[ "${VERSION}" != *-* ]]; then
              echo "${IMAGE_NAME}:slim"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push full container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.full_tags }}
          labels: |
            org.opencontainers.image.title=salus
            org.opencontainers.image.description=Container health check probe runner
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Build and push slim container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            SALUS_FEATURE_PROFILE=slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.slim_tags }}
          labels: |
            org.opencontainers.image.title=salus
            org.opencontainers.image.description=Container health check probe runner (slim)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
