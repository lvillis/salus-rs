name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check
        run: cargo check --all-features --locked

      - name: Check slim build
        run: cargo check --no-default-features --locked

      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Lint slim build
        run: cargo clippy --all-targets --no-default-features --locked -- -D warnings

      - name: Test
        run: cargo test --all-features --locked

      - name: Test slim build
        run: cargo test --no-default-features --locked

      - name: Release build
        run: cargo build --release --locked

      - name: Release slim build
        run: cargo build --release --locked --no-default-features

      - name: Verify Docker build
        run: docker build -t salus-ci .

      - name: Verify slim Docker build
        run: docker build --build-arg SALUS_FEATURE_PROFILE=slim -t salus-ci-slim .
